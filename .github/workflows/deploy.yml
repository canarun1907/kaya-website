name: Deploy to VPS

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 84.201.25.120
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "index.html,style.css,logo.png"
          target: /home/admin/web/otokayayedekparca.com.tr/public_html/
